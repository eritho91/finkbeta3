<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fink - Registrera</title>
    <link rel="stylesheet" th:href="@{static/css/style.css}">
</head>
<body class="center-page">

<div class="logo-text">Fink</div>

<div class="container">
    <h1>Registrera ny användare</h1>

    <form th:action="@{/register}" th:object="${form}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <label for="username">Användarnamn</label>
        <input type="text" id="username" th:field="*{username}">
        <p class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>

        <label for="password">Lösenord</label>
        <input type="password" id="password" th:field="*{password}">
        <p class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>

        <button type="submit">Registrera</button>
    </form>

    <p><a th:href="@{/}">Tillbaka till login</a></p>
</div>

</body>
</html>
